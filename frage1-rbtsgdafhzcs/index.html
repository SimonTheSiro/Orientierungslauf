<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frage 1</title>
	<style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #202020;
            color: white;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header, .footer {
            background-color: #3D5DFF;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        .footer {
            margin-top: auto;
			display: flex;
			justify-content: space-between;
			align-items: center;
			color: white;
			padding: 20px;
			position: relative;
			font-size: 14px;
        }
		.footer-left {
			position: absolute;
			left: 15px;
		}
		.footer-right {
			position: absolute;
			right: 15px;
			text-align: right;
		}
		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			color: white;
			padding: 20px;
			position: relative;
		}
		.title {
			font-size: 20px;
		}
        .content {
            text-align: center;
            padding: 20px;
        }
		.answer {
			text-decoration: none;
			color: lightblue;
			font-size: 20px;
		}
		.answer:hover {
			color: blue;
		}
		.button-content {
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: left;
		}
		#info-box {
			border: 3px solid blue;
			border-radius: 15px;
			padding: 20px;
			margin: 50px auto;
			width: 80%;
			text-align: center;
			font-size: 20px;
			font-weight: bold;
			background-color: transparent;
		}
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Orientierungslauf</div>
    </div>
	
	<div class="content">
		<div id="info-box">
			Hier soll die Frage stehen
		</div>
	</div>
	
    <div class="button-content">
		<ul>
			<li><a href="https://google.com" class="answer">Erste Antwort</a></li>
			<li><a href="https://google.com" class="answer">Zweite Antwort</a></li>
			<li><a href="https://google.com" class="answer">Dritte Antwort</a></li>
		</ul>
    </div>
	
    <div class="footer">
		<div class="footer-left">
			Orientierungslauf von Simon
		</div>
	</div>

</body>
</html>
