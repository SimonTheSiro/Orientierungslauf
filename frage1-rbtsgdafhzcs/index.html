<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frage 1</title>
	<style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #202020;
            color: white;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header, .footer {
            background-color: #3D5DFF;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        .footer {
            margin-top: auto;
			display: flex;
			justify-content: space-between;
			align-items: center;
			color: white;
			padding: 20px;
			position: relative;
			font-size: 14px;
        }
		.footer-left {
			position: absolute;
			left: 15px;
		}
		.footer-right {
			position: absolute;
			right: 15px;
			text-align: right;
		}
		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			color: white;
			padding: 20px;
			position: relative;
		}
		.title {
			font-size: 20px;
		}
        .content {
            text-align: center;
            padding: 20px;
        }
		#info-box {
			border: 3px solid blue;
			border-radius: 15px;
			padding: 20px;
			margin: 50px auto;
			width: 80%;
			text-align: center;
			font-size: 20px;
			font-weight: bold;
			background-color: transparent;
		}
        .answer-box {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px;
            gap: 20px;
        }
        .fraction-container {
            display: inline-block;
            text-align: center;
            margin: 20px 0;
        }
        .fraction {
            display: inline-block;
            vertical-align: middle;
        }
        .fraction input {
            width: 40px;
            text-align: center;
        }
        .fraction-line {
            border-top: 2px solid white;
            margin: 5px 0;
        }
        #result {
            margin-top: 15px;
            font-size: 2em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Orientierungslauf</div>
    </div>
	
	<div class="content">
		<div id="info-box">
			Gegeben ist eine Gerade, die auf den Punkten A(2|3) und B(8|11) liegt. Wie groß ist die Steigung der Geraden? (gekürzten Bruch angeben)
		</div>
        
        <div class="answer-box">
            <h3>Eingabe: Steigung =</h3>
            <div class="fraction-container">
                <div class="fraction">
                    <input type="number" id="numerator" placeholder="">
                    <div class="fraction-line"></div>
                    <input type="number" id="denominator" placeholder="">
                </div>
            </div>
        </div>
        
        <button onclick="checkAnswer()">Prüfen</button>
        
        <div id="result"></div>
        
	</div>
	
    <div class="footer">
		<div class="footer-left">
			 Von Knips, Jesko und Simon
		</div>
	</div>
    
    <script>
        function checkAnswer() {
            // Zähler und Nenner auslesen
            const numerator = parseFloat(document.getElementById('numerator').value);
            const denominator = parseFloat(document.getElementById('denominator').value);

            // Erwartete Bruch-Werte
            const expectedNumerator = 4;
            const expectedDenominator = 3;

            // Prüfen
            if (numerator === expectedNumerator && denominator === expectedDenominator) {
                // Richtige Antwort
                document.getElementById('result').style.color = "green";
                document.getElementById('result').textContent = "Die Antwort ist richtig! Die Zahl lautet: 17";
            } else {
                // Falsche Antwort
                document.getElementById('result').style.color = "red";
                document.getElementById('result').textContent = "Falsch! Versuch es noch einmal.";
            }
        }
    </script>

</body>
</html>
